<!DOCTYPE html>
<html>

<head>
    <title>HLS.js Video Player with Custom Design</title>
    <!-- Include meta tag for viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Include Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        /* Style for the video player container */
        .video-container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Custom CSS for the video player */
        .custom-video-player {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            background-color: #000;
            /* Set custom background color for video player */
        }

        .custom-video-player video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            outline: none;
        }

        .custom-video-player .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #fff;
            cursor: pointer;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="container mt-5">
        <div class="video-container">
            <h1 class="text-center">Custom HLS.js Video Player</h1>
            <div class="custom-video-player">
                <video id="videoPlayer" preload="none"></video>
                <div class="play-btn">&#9658;</div>
            </div>
        </div>
    </div>

    <!-- Include HLS.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- Include Bootstrap and jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        // Initialize HLS.js
        var video = document.getElementById('videoPlayer');
        var hls = new Hls();
        var videoUrl = 'https://stream.skynewsarabia.com/hls/sna.m3u8'; // Update with your actual M3U8 file URL

        if (Hls.isSupported()) {
            hls.loadSource(videoUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                video.addEventListener('loadedmetadata', function () {
                    // Add event listener to play button
                    document.querySelector('.play-btn').addEventListener('click', function () {
                        video.play();
                        document.querySelector('.play-btn').style.display = 'none';
                    });
                });
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoUrl;
            video.addEventListener('loadedmetadata', function () {
                // Add event listener to play button
                document.querySelector('.play-btn').addEventListener('click', function () {
                    video.play();
                    document.querySelector('.play-btn').style.display = 'none';
                });
            });
        }
    </script>
</body>

</html>
