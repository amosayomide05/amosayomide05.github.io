<!DOCTYPE html>
<html>
<head>
    <title>AnimeDex Uploads</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</head>
<body>

<!-- Header -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="#">AnimeDex Uploads</a>
    <a href="https://chat.whatsapp.com/link-to-whatsapp-group" target="_blank" class="navbar-link">
        <i class="fa fa-whatsapp"></i>
    </a>
</nav>

<!-- Video player -->
<div class="container mt-3">
    <div class="row">
        <div class="col-md-12 text-center">
            <div class="play-btn">
                <i class="fa fa-play-circle-o fa-5x"></i>
            </div>
            <video id="videoPlayer" class="w-100"></video>
        </div>
    </div>
</div>

<!-- Include FontAwesome for WhatsApp icon -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<!-- Include HLS.js for playing m3u8 files -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<!-- Custom JavaScript for video player -->
<script>
    // Get the video element
    var video = document.getElementById('videoPlayer');

    // Add event listener for play button
    $('.play-btn').on('click', function () {
        // Hide the play button
        $('.play-btn').hide();

        // Initialize HLS.js
        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource('https://stream.skynewsarabia.com/hls/sna.m3u8');
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = 'https://stream.skynewsarabia.com/hls/sna.m3u8';
            video.addEventListener('loadedmetadata', function () {
                video.play();
            });
        }
    });

    // Add event listener for video ended
    video.addEventListener('ended', function () {
        // Show the play button when video ends
        $('.play-btn').show();
    });
</script>

</body>
</html>
