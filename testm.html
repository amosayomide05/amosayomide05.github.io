<!DOCTYPE html>
<html>
<head>
    <title>HLS.js Video Player with Bootstrap</title>
    <!-- Include meta tag for viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Include Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        /* Style for the video player container */
        .video-container {
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="video-container">
            <h1 class="text-center">HLS.js Video Player</h1>
            <video id="videoPlayer" class="w-100 mt-3" controls></video>
        </div>
    </div>

    <!-- Include HLS.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- Include Bootstrap and jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        // Initialize HLS.js
        var video = document.getElementById('videoPlayer');
        var hls = new Hls();
        var videoUrl = 'https://stream.skynewsarabia.com/hls/sna.m3u8'; // Update with your actual M3U8 file URL

        if (Hls.isSupported()) {
            hls.loadSource(videoUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoUrl;
            video.addEventListener('loadedmetadata', function () {
                video.play();
            });
        }
    </script>
</body>
</html>
